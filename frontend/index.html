<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Schedule Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    body { background-color: #f8fafc; color: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .timeline-line { position: absolute; left: 1.5rem; top: 2rem; bottom: -2rem; width: 2px; background-color: #e2e8f0; z-index: 0; }
    @media (min-width: 768px) { .timeline-line { left: 2rem; } }
    .timeline-item:last-child .timeline-line { display: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load our app as an ES module so we can use standard import/export without a build tool -->
  <script type="module" src="/frontend/App.js"></script>
</body>
</html>
