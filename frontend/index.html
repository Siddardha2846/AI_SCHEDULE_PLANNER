<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Schedule Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #f8fafc; color: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .timeline-line { position: absolute; left: 1.5rem; top: 2rem; bottom: -2rem; width: 2px; background-color: #e2e8f0; z-index: 0; }
    @media (min-width: 768px) { .timeline-line { left: 2rem; } }
    .timeline-item:last-child .timeline-line { display: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ─── SVG Icons ────────────────────────────────────────────────────────────
    const CalIcon = () => (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    );
    const SparkIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
      </svg>
    );
    const WarnIcon = ({size=16}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    );
    const RefreshIcon = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
    );
    const Spinner = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{animation:'spin 0.8s linear infinite',display:'inline-block'}}>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
      </svg>
    );

    // ─── Backend API call ─────────────────────────────────────────────────────
    async function callBackendAPI(userPrompt) {
      const res = await fetch("/generate-schedule", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: userPrompt })
      });
      if (!res.ok) {
        let errStr = `API error ${res.status}: ${res.statusText}`;
        try {
           const errData = await res.json();
           if (errData.detail) errStr = errData.detail;
        } catch (e) {}
        throw new Error(errStr);
      }
      const data = await res.json();
      return data;
    }

    // ─── Type & Priority colours ──────────────────────────────────────────────
    function typeStyle(type) {
      return { routine:'bg-blue-50 border-blue-200 text-blue-800', fixed:'bg-red-50 border-red-200 text-red-800',
               study:'bg-purple-50 border-purple-200 text-purple-800', health:'bg-green-50 border-green-200 text-green-800',
               break:'bg-yellow-50 border-yellow-200 text-yellow-800' }[type] || 'bg-slate-50 border-slate-200 text-slate-800';
    }
    function priorityStyle(p) {
      return { high:'bg-red-100 text-red-800', medium:'bg-amber-100 text-amber-800', low:'bg-slate-100 text-slate-700' }[p] || 'bg-slate-100 text-slate-700';
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [prompt, setPrompt] = useState(
        "Plan my day for today.\nI have college from 9 AM to 4 PM.\nI need to complete DSA practice, revise DBMS, submit assignment, go to gym, and sleep by 11 PM.\nGive me a strict realistic schedule with breaks."
      );
      const [loading, setLoading] = useState(false);
      const [error, setError]     = useState('');
      const [data, setData]       = useState(null);

      const generate = async () => {
        if (!prompt.trim()) { setError('Please enter your routine and tasks.'); return; }
        setLoading(true); setError('');
        try {
          const result = await callBackendAPI(prompt);
          setData(result);
        } catch (e) {
          setError(e.message || 'Something went wrong. Please try again.');
        } finally { setLoading(false); }
      };

      const reset = () => { setData(null); setError(''); };

      if (data) return (
        <div className="min-h-screen">
          <header className="bg-white shadow-sm border-b sticky top-0 z-10">
            <div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-2">
              <div className="bg-sky-500 p-1.5 rounded-lg text-white"><CalIcon /></div>
              <span className="font-semibold text-slate-800">AI Schedule Planner</span>
            </div>
          </header>
          <main className="max-w-3xl mx-auto px-4 py-8 fade-in">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
              <div>
                <h2 className="text-2xl font-bold text-slate-800">Your Perfect Day</h2>
                <p className="text-slate-500 text-sm mt-1 flex items-center gap-1"><CalIcon /> {data.date}</p>
              </div>
              <button onClick={reset} className="flex items-center gap-1.5 px-4 py-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-lg text-sm font-medium shadow-sm transition-colors">
                <RefreshIcon /> Plan Another Day
              </button>
            </div>

            <div className="bg-white rounded-2xl border border-slate-200 p-5 mb-6 shadow-sm">
              <p className="text-xs uppercase tracking-widest text-slate-400 font-semibold mb-2">Summary</p>
              <p className="text-slate-700 leading-relaxed">{data.summary}</p>
              {data.warnings?.filter(w => w?.trim()).map((w, i) => (
                <div key={i} className="mt-3 flex gap-2 items-start bg-amber-50 border border-amber-200 text-amber-800 text-sm p-3 rounded-lg">
                  <WarnIcon size={15} /><span>{w}</span>
                </div>
              ))}
            </div>

            <div className="relative pl-6 md:pl-10">
              {data.schedule.map((item, idx) => (
                <div key={item.id ?? idx} className="relative timeline-item pb-6">
                  <div className="timeline-line" />
                  <div className="flex items-start gap-3 md:gap-5 relative z-10">
                    <div className="w-16 md:w-20 shrink-0 text-right mt-1">
                      <div className="text-sm font-bold text-slate-700">{item.start_time}</div>
                      <div className="text-xs text-slate-400">{item.end_time}</div>
                    </div>
                    <div className="w-3 h-3 rounded-full bg-sky-500 mt-2 shrink-0 border-2 border-white shadow" />
                    <div className={`flex-1 rounded-xl border p-4 hover:-translate-y-0.5 transition-transform duration-200 ${typeStyle(item.type)}`}>
                      <div className="flex justify-between items-start gap-2 mb-1">
                        <span className="font-semibold text-sm">{item.title}</span>
                        <span className={`text-xs px-2 py-0.5 rounded-full font-semibold uppercase tracking-wide ${priorityStyle(item.priority)}`}>{item.priority}</span>
                      </div>
                      <p className="text-xs opacity-75 flex items-start gap-1 mt-1.5">
                        <WarnIcon size={12} /><span>{item.reason}</span>
                      </p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </main>
        </div>
      );

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-white shadow-sm border-b">
            <div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-2">
              <div className="bg-sky-500 p-1.5 rounded-lg text-white"><CalIcon /></div>
              <span className="font-semibold text-slate-800">AI Schedule Planner</span>
            </div>
          </header>
          <main className="flex-1 flex items-start justify-center px-4 py-12">
            <div className="w-full max-w-xl">
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="bg-slate-50 border-b border-slate-100 px-6 py-4">
                  <h2 className="font-semibold text-slate-800 flex items-center gap-2"><SparkIcon /> What's your plan for the day?</h2>
                  <p className="text-slate-500 text-sm mt-1">Enter your routine, fixed timings and tasks — get a perfectly balanced schedule.</p>
                </div>
                <div className="p-6">
                  <textarea
                    value={prompt} onChange={e => setPrompt(e.target.value)}
                    className="w-full h-44 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sky-400 focus:border-sky-400 resize-none outline-none text-sm transition-all"
                    placeholder="e.g. I have college from 9 to 4. I need to study DSA, go to gym, and sleep by 11 PM..."
                  />
                  {error && (
                    <div className="mt-3 p-3 bg-red-50 text-red-700 rounded-lg flex items-start gap-2 text-sm border border-red-100">
                      <WarnIcon /><span>{error}</span>
                    </div>
                  )}
                  <div className="mt-5 flex justify-end gap-3">
                    <button onClick={() => { setPrompt(''); setError(''); }} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium transition-colors">Clear</button>
                    <button onClick={generate} disabled={loading}
                      className="px-5 py-2 bg-sky-600 hover:bg-sky-700 text-white rounded-lg font-medium text-sm flex items-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed transition-colors shadow-sm">
                      {loading ? <React.Fragment><Spinner /> Generating...</React.Fragment>
                               : <React.Fragment><SparkIcon /> Generate Schedule</React.Fragment>}
                    </button>
                  </div>
                </div>
              </div>
              <p className="text-center text-xs text-slate-400 mt-6">Pro tip: Mention strict time constraints for better results.</p>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
